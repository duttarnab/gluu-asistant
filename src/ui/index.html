<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gluu AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f14;
    --surface:#13161d;
    --surface2:#1a1e28;
    --border:#252a38;
    --accent:#4f8ef7;
    --accent2:#6ee7b7;
    --text:#e2e8f0;
    --muted:#64748b;
    --user-bg:#1e2a3a;
    --ai-bg:#131a14;
    --radius:10px;
    --font:'IBM Plex Sans',sans-serif;
    --mono:'IBM Plex Mono',monospace;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .logo-text{font-size:16px;font-weight:500;letter-spacing:-0.02em}
  .logo-sub{font-size:12px;color:var(--muted);margin-left:4px}
  .header-actions{display:flex;gap:8px;align-items:center}
  #stats-badge{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
  .btn-clear{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);padding:4px 12px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all .15s}
  .btn-clear:hover{color:var(--text);border-color:var(--muted)}

  /* Chat area */
  #chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
  #chat::-webkit-scrollbar{width:4px}
  #chat::-webkit-scrollbar-track{background:transparent}
  #chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* Welcome */
  .welcome{text-align:center;margin:auto;padding:40px 20px;max-width:480px}
  .welcome h1{font-size:28px;font-weight:300;letter-spacing:-0.03em;margin-bottom:12px}
  .welcome h1 span{color:var(--accent)}
  .welcome p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:28px}
  .examples{display:flex;flex-direction:column;gap:8px}
  .example-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font);text-align:left;transition:all .15s}
  .example-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* Messages */
  .msg{display:flex;flex-direction:column;gap:6px;max-width:800px}
  .msg.user{align-self:flex-end;align-items:flex-end}
  .msg.ai{align-self:flex-start;align-items:flex-start}
  .msg-role{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:0 4px}
  .msg-bubble{padding:14px 18px;border-radius:var(--radius);line-height:1.7;word-break:break-word}
  .msg.user .msg-bubble{background:var(--user-bg);border:1px solid #2a3a54;border-radius:var(--radius) var(--radius) 2px var(--radius)}
  .msg.ai .msg-bubble{background:var(--ai-bg);border:1px solid var(--border);border-radius:2px var(--radius) var(--radius) var(--radius);width:100%}

  /* Markdown inside AI bubble */
  .msg-bubble p{margin-bottom:10px}
  .msg-bubble p:last-child{margin-bottom:0}
  .msg-bubble code{font-family:var(--mono);font-size:13px;background:#1e2533;padding:2px 6px;border-radius:4px;color:#a5f3fc}
  .msg-bubble pre{background:#1a1e28;border:1px solid var(--border);border-radius:8px;padding:14px;margin:12px 0;overflow-x:auto}
  .msg-bubble pre code{background:none;padding:0;color:#e2e8f0}
  .msg-bubble ul,ol{padding-left:20px;margin-bottom:10px}
  .msg-bubble li{margin-bottom:4px}
  .msg-bubble h3,h4{margin:12px 0 6px;font-weight:500}
  .msg-bubble strong{font-weight:500;color:#93c5fd}

  /* Sources */
  .sources{margin-top:8px;display:flex;flex-direction:column;gap:4px}
  .source-chip{font-size:11px;font-family:var(--mono);color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:all .15s;max-width:500px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .source-chip:hover{color:var(--accent2);border-color:var(--accent2)}
  .source-chip::before{content:'↗';font-size:10px}

  /* Typing indicator */
  .typing{display:flex;gap:5px;align-items:center;padding:14px 18px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
  .dot:nth-child(2){animation-delay:.15s}
  .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  /* Input area */
  #input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .input-row{display:flex;gap:10px;align-items:flex-end;max-width:800px;margin:0 auto}
  #question{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--radius);font-family:var(--font);font-size:15px;resize:none;min-height:48px;max-height:180px;line-height:1.5;transition:border-color .15s;outline:none}
  #question::placeholder{color:var(--muted)}
  #question:focus{border-color:var(--accent)}
  #send-btn{width:48px;height:48px;background:var(--accent);border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:#fff}
  #send-btn:hover{background:#6b9ef8;transform:scale(1.03)}
  #send-btn:disabled{background:var(--border);cursor:not-allowed;transform:none}
  #send-btn svg{width:20px;height:20px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <span class="logo-text">Gluu Assistant<span class="logo-sub"> / AI</span></span>
  </div>
  <div class="header-actions">
    <span id="stats-badge">loading…</span>
    <button class="btn-clear" onclick="clearHistory()">New chat</button>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h1>Ask about <span>Gluu</span></h1>
    <p>I have access to the Gluu Identity Platform documentation and GitHub repositories. Ask me anything about installation, configuration, OpenID Connect, OAuth 2.0, SAML, FIDO, and more.</p>
    <div class="examples">
      <button class="example-btn" onclick="ask(this.textContent)">How do I install Gluu Server on Ubuntu?</button>
      <button class="example-btn" onclick="ask(this.textContent)">How do I configure OpenID Connect in Gluu?</button>
      <button class="example-btn" onclick="ask(this.textContent)">What is the difference between Gluu 4 and Gluu 5?</button>
      <button class="example-btn" onclick="ask(this.textContent)">How do I add a custom authentication script?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="question" placeholder="Ask a question about Gluu…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('question');
const sendBtn = document.getElementById('send-btn');

// Load stats
fetch('/api/stats').then(r=>r.json()).then(s=>{
  document.getElementById('stats-badge').textContent = `${s.count.toLocaleString()} chunks · ${s.model}`;
}).catch(()=>{
  document.getElementById('stats-badge').textContent = 'DB not ready';
});

// Auto-resize textarea
input.addEventListener('input', ()=>{
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,180)+'px';
});

// Enter to send (Shift+Enter for newline)
input.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

function ask(text){ input.value=text; sendMessage(); }

function appendMsg(role, html, sources=[]){
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-role">${role==='user'?'You':'Gluu Assistant'}</div><div class="msg-bubble">${html}</div>`;

  if(sources.length>0){
    const sourceDiv = document.createElement('div');
    sourceDiv.className = 'sources';
    // Deduplicate sources by URL
    const seen = new Set();
    sources.forEach(s=>{
      if(seen.has(s.source)) return;
      seen.add(s.source);
      const a = document.createElement('a');
      a.className = 'source-chip';
      a.href = s.source;
      a.target = '_blank';
      a.rel = 'noopener';
      a.title = s.source;
      a.textContent = s.title || s.source;
      sourceDiv.appendChild(a);
    });
    div.appendChild(sourceDiv);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function appendTyping(){
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-role">Gluu Assistant</div><div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Simple markdown render (bold, code, headers, lists)
function renderMarkdown(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{3}\s(.+)/gm,'<h4>$1</h4>')
    .replace(/^#{2}\s(.+)/gm,'<h3>$1</h3>')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/^/,'<p>').replace(/$/, '</p>')
    .replace(/<p><\/p>/g,'');
}

async function sendMessage(){
  const q = input.value.trim();
  if(!q || sendBtn.disabled) return;

  input.value=''; input.style.height='auto';
  sendBtn.disabled = true;

  appendMsg('user', renderMarkdown(q));
  appendTyping();

  let aiDiv = null;
  let bubble = null;
  let fullText = '';
  let sources = [];

  try{
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({question:q, topK:5})
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      buf += decoder.decode(value,{stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();

      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        const data = JSON.parse(line.slice(5).trim());

        if(data.type==='sources'){
          sources = data.sources;
        } else if(data.type==='token'){
          // Replace typing indicator on first token
          if(!aiDiv){
            const indicator = document.getElementById('typing-indicator');
            if(indicator) indicator.remove();
            aiDiv = appendMsg('ai','',sources);
            bubble = aiDiv.querySelector('.msg-bubble');
          }
          fullText += data.token;
          bubble.innerHTML = renderMarkdown(fullText);
          chat.scrollTop = chat.scrollHeight;
        } else if(data.type==='done'){
          // Render final sources if not yet added
          if(aiDiv && sources.length>0 && !aiDiv.querySelector('.sources')){
            const sourceDiv = document.createElement('div');
            sourceDiv.className='sources';
            const seen=new Set();
            sources.forEach(s=>{
              if(seen.has(s.source)) return; seen.add(s.source);
              const a=document.createElement('a');
              a.className='source-chip'; a.href=s.source; a.target='_blank'; a.rel='noopener';
              a.title=s.source; a.textContent=s.title||s.source;
              sourceDiv.appendChild(a);
            });
            aiDiv.appendChild(sourceDiv);
          }
        } else if(data.type==='error'){
          const indicator = document.getElementById('typing-indicator');
          if(indicator) indicator.remove();
          appendMsg('ai', `<span style="color:#f87171">Error: ${data.message}</span>`);
        }
      }
    }
  } catch(err){
    const indicator = document.getElementById('typing-indicator');
    if(indicator) indicator.remove();
    appendMsg('ai',`<span style="color:#f87171">Connection error. Is the server running?</span>`);
  }

  sendBtn.disabled = false;
  input.focus();
}

async function clearHistory(){
  await fetch('/api/history',{method:'DELETE'});
  chat.innerHTML='';
  chat.innerHTML=`<div class="welcome" id="welcome">
    <h1>Ask about <span>Gluu</span></h1>
    <p>Conversation cleared. Start a new question below.</p>
    <div class="examples">
      <button class="example-btn" onclick="ask(this.textContent)">How do I install Gluu Server on Ubuntu?</button>
      <button class="example-btn" onclick="ask(this.textContent)">How do I configure OpenID Connect in Gluu?</button>
      <button class="example-btn" onclick="ask(this.textContent)">What is the difference between Gluu 4 and Gluu 5?</button>
    </div>
  </div>`;
}
</script>
</body>
</html>
